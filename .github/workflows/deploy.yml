name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Trigger deploy
        run: |
          curl -fsSL -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}"
